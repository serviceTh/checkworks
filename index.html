<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบตรวจงานสถาปัตยกรรม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
    .badge-รอตรวจ { @apply bg-orange-50 text-orange-600 border border-orange-200 shadow-sm; }
    .badge-ตรวจแล้ว { @apply bg-green-50 text-green-600 border border-green-200 shadow-sm; }
    .badge-รอแก้ไข { @apply bg-red-50 text-red-600 border border-red-200 shadow-sm; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12">

  <div class="container mx-auto px-4 py-8 max-w-5xl">
    <div class="bg-white/80 rounded-[2.5rem] shadow-premium p-10 mb-10 border border-white/60 backdrop-blur-md relative overflow-hidden group">
      <div class="absolute top-0 right-0 w-32 h-32 bg-[#b89474]/10 rounded-full -mr-16 -mt-16 blur-3xl group-hover:bg-[#b89474]/20 transition-all duration-700"></div>
      <h1 class="text-4xl font-black text-slate-800 tracking-tight flex items-center gap-3">
        <span class="w-2 h-10 bg-[#b89474] rounded-full"></span>
        หน้าหลัก - โพสต์รอตรวจ
      </h1>
      <p class="text-slate-500 mt-4 font-medium text-lg">รายการงานที่ต้องดำเนินการตรวจสอบความเรียบร้อย</p>
    </div>

    <div class="bg-white/60 rounded-[2rem] shadow-xl p-8 mb-10 border border-white/40 flex flex-col md:flex-row gap-6 items-center">
      <div class="flex-1 relative w-full">
        <input type="text" id="search-input" placeholder="ค้นหาชื่อโพสต์, หมายเลขห้อง..." 
               class="w-full pl-14 pr-6 py-4 bg-white/80 border-2 border-dashed border-slate-300 rounded-2xl focus:ring-4 focus:ring-[#b89474]/20 focus:border-[#b89474] focus:border-solid outline-none transition-all duration-300 text-lg shadow-inner">
        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl">🔍</span>
      </div>
      <select id="status-filter" 
              class="w-full md:w-56 px-6 py-4 bg-white/80 border-2 border-dashed border-slate-300 rounded-2xl focus:ring-4 focus:ring-[#b89474]/20 focus:border-[#b89474] focus:border-solid outline-none transition-all duration-300 font-bold text-slate-600 text-lg shadow-inner appearance-none cursor-pointer">
        <option value="">ทุกสถานะ</option>
        <option value="รอตรวจ">รอตรวจ</option>
        <option value="ตรวจแล้ว">ตรวจแล้ว</option>
        <option value="รอแก้ไข">รอแก้ไข</option>
      </select>
      <button class="w-full md:w-auto px-10 py-4 bg-slate-800 text-white rounded-2xl hover:bg-slate-900 transition-all duration-300 font-bold shadow-xl shadow-slate-200 hover:-translate-y-0.5 active:scale-95" id="search-btn">ค้นหา</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="post-grid" style="display: none;">
      <!-- Posts will be rendered here -->
    </div>

    <div class="mt-12 flex justify-center gap-2" id="pagination-container">
      <!-- Pagination buttons -->
    </div>

  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/frontend.js"></script>
</body>
</html>
