<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจสอบงาน - ระบบตรวจงานสถาปัตยกรรม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f7f3ee; }
    .hidden { display: none; }
    .badge-รอตรวจ { background-color: #fffaf0; color: #ea580c; border: 1px solid #fed7aa; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .badge-ตรวจแล้ว { background-color: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .badge-รอแก้ไข { background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
  </style>
</head>
<body class="bg-texture min-h-screen pb-12 text-slate-700">

  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <div class="bg-white/60 rounded-[2.5rem] shadow-premium p-10 mb-10 border border-white/60 backdrop-blur-md flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative overflow-hidden group">
      <div class="absolute top-0 right-0 w-32 h-32 bg-[#b89474]/10 rounded-full -mr-16 -mt-16 blur-2xl group-hover:bg-[#b89474]/20 transition-all duration-700"></div>
      <div class="relative z-10">
        <h1 id="page-title" class="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-3">
          <span class="w-2 h-8 bg-[#b89474] rounded-full"></span>
          กำลังตรวจสอบงาน
        </h1>
        <p id="page-status" class="text-slate-500 mt-2 font-medium flex items-center gap-2">สถานะ: -</p>
      </div>
      <div class="flex gap-3 relative z-10">
        <a href="index.html" class="px-6 py-3 bg-white/80 text-slate-600 rounded-2xl hover:bg-white transition-all font-bold shadow-sm border border-slate-200">ย้อนกลับ</a>
        <button id="submit-inspection-btn" class="px-8 py-3 bg-slate-800 text-white rounded-2xl hover:bg-slate-900 transition-all font-bold shadow-xl shadow-slate-200 hidden active:scale-95">บันทึกผลการตรวจ</button>
      </div>
    </div>

    <!-- Read only warning -->
    <div id="readonly-warning" class="hidden mb-10 p-8 bg-slate-800 text-white rounded-[2rem] shadow-premium flex items-center gap-6 border-t-4 border-[#b89474]">
      <span class="text-4xl">✅</span>
      <div>
        <p class="font-black text-xl mb-1">โพสต์นี้ถูกอัพเดทผลตรวจแล้ว</p>
        <p class="text-slate-300 font-medium">ไม่สามารถส่งผลตรวจซ้ำได้ เพื่อรักษาข้อมูลการตรวจครั้งแรกครับ</p>
      </div>
    </div>

    <div class="bg-white/80 rounded-[2rem] shadow-xl p-8 mb-10 border border-white/40 space-y-8">
      <h3 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
        <span class="w-1.5 h-6 bg-[#b89474] rounded-full"></span>
        ข้อมูลผู้ตรวจงาน
      </h3>
      <div class="space-y-2">
        <label class="block text-sm font-semibold text-slate-600 ml-1">ชื่อผู้ตรวจ * (กรุณาระบุชื่อผู้บันทึกข้อมูล)</label>
        <input type="text" id="inspector-name" required placeholder="ใส่ชื่อนามสกุลผู้ตรวจสอบ" 
               class="w-full px-5 py-3.5 bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-[#b89474] focus:border-solid outline-none transition-all duration-300 placeholder:text-slate-400 font-medium">
      </div>
    </div>

    <div id="topics-container" class="hidden space-y-8">
      <!-- Topics rendered here via frontend.js -->
    </div>

    <!-- Scroll down button -->
    <button onclick="document.getElementById('submit-inspection-btn').scrollIntoView({behavior:'smooth'})" 
            class="fixed bottom-6 right-6 w-14 h-14 bg-[#b89474] hover:bg-[#a68060] text-white rounded-full flex justify-center items-center shadow-2xl transition-all duration-300 hover:-translate-y-1 z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
        </svg>
    </button>

  </div>


  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/image-marker.js"></script>
  <script src="js/frontend.js"></script>
</body>
</html>
