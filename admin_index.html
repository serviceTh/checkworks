<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - ระบบตรวจงานสถาปัตยกรรม</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      body { font-family: 'Prompt', sans-serif; background-color: #f7f3ee; }
      .badge-รอตรวจ { @apply bg-orange-50 text-orange-600 border border-orange-200 shadow-sm; }
      .badge-ตรวจแล้ว { @apply bg-green-50 text-green-600 border border-green-200 shadow-sm; }
      .badge-รอแก้ไข { @apply bg-red-50 text-red-600 border border-red-200 shadow-sm; }
    </style>
  </head>
  <body class="bg-texture min-h-screen pb-12">
    <div class="container mx-auto px-4 py-8 max-w-7xl">
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10 bg-white/60 p-10 rounded-[2.5rem] border border-white/60 backdrop-blur-md shadow-premium relative overflow-hidden group">
        <div class="absolute top-0 right-0 w-32 h-32 bg-[#b89474]/10 rounded-full -mr-16 -mt-16 blur-2xl group-hover:bg-[#b89474]/20 transition-all duration-700"></div>
        <div>
          <h1 class="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-3">
            <span class="w-2 h-8 bg-[#b89474] rounded-full"></span>
            ระบบจัดการตรวจงาน (Admin)
          </h1>
          <p class="text-slate-500 mt-2 font-medium">สำหรับผู้ดูแลระบบและเพิ่มงานก่อสร้าง</p>
        </div>
        <div class="flex flex-wrap gap-4 relative z-10">
            <div class="flex gap-3 bg-white/80 p-2 rounded-2xl shadow-inner border border-slate-200">
                <a href="admin_dashboard.html" class="px-6 py-2.5 text-slate-500 hover:bg-slate-50 rounded-xl transition-all duration-300">📊 สถิติภาพรวม</a>
                <a href="admin_index.html" class="px-6 py-2.5 bg-[#b89474] text-white font-bold rounded-xl transition-all duration-300 shadow-lg shadow-[#b89474]/20">📋 รายการโพสต์</a>
            </div>
            <a href="admin_post.html" class="inline-flex items-center gap-2 px-8 py-3.5 bg-slate-800 text-white rounded-2xl hover:bg-slate-900 transition-all duration-300 font-bold shadow-xl shadow-slate-300 hover:-translate-y-0.5">
                <span>+</span> สร้างโพสต์ใหม่
            </a>
        </div>
      </div>

      <div class="bg-white rounded-[2rem] shadow-xl p-8 mb-10 border border-slate-200/50 flex flex-col md:flex-row gap-6">
        <div class="flex-1 relative">
          <input type="text" id="search-input" placeholder="ค้นหาชื่อโพสต์, หมายเลขห้อง..." 
                 class="w-full pl-14 pr-6 py-4 bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 focus:border-solid outline-none transition-all duration-300 text-lg shadow-inner">
          <span class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl filter drop-shadow-sm">🔍</span>
        </div>
        <select id="status-filter" 
                class="md:w-64 px-6 py-4 bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 focus:border-solid outline-none transition-all duration-300 font-bold text-slate-600 text-lg shadow-inner appearance-none cursor-pointer">
          <option value="">ทุกสถานะ</option>
          <option value="รอตรวจ">รอตรวจ</option>
          <option value="ตรวจแล้ว">ตรวจแล้ว</option>
          <option value="รอแก้ไข">รอแก้ไข</option>
        </select>
        <button class="px-10 py-4 bg-slate-800 text-white rounded-2xl hover:bg-slate-900 transition-all duration-300 font-bold shadow-xl shadow-slate-300 hover:-translate-y-0.5" id="search-btn">ค้นหา</button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="post-grid" style="display: none">
        <!-- Posts will be rendered here -->
      </div>

      <div class="mt-12 flex justify-center gap-2" id="pagination-container">
        <!-- Pagination buttons -->
      </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/backend.js"></script>
  </body>
</html>
