<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แก้ไข/ดูโพสต์ - Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f7f3ee; }
    .hidden { display: none; }
    .badge-รอตรวจ { background-color: #fffaf0; color: #ea580c; border: 1px solid #fed7aa; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .badge-ตรวจแล้ว { background-color: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
    .badge-รอแก้ไข { background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
  </style>
</head>
<body class="bg-texture min-h-screen pb-20 text-slate-700">

  <div class="container mx-auto px-4 py-8 max-w-4xl">
    <div class="bg-white/60 rounded-[2.5rem] shadow-premium p-10 mb-10 border border-white/60 backdrop-blur-md flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative overflow-hidden group">
      <div class="absolute top-0 right-0 w-32 h-32 bg-[#b89474]/10 rounded-full -mr-16 -mt-16 blur-2xl group-hover:bg-[#b89474]/20 transition-all duration-700"></div>
      <div class="relative z-10">
        <h1 id="page-title" class="text-3xl font-black text-slate-800 tracking-tight flex items-center gap-3">
          <span class="w-2 h-8 bg-[#b89474] rounded-full"></span>
          แก้ไขข้อมูลงาน
        </h1>
        <p id="page-status" class="text-slate-500 mt-2 font-medium flex items-center gap-2">สถานะ: -</p>
      </div>
      <div class="flex gap-3 relative z-10">
        <a href="admin_index.html" class="px-6 py-3 bg-white/80 text-slate-600 rounded-2xl hover:bg-white transition-all font-bold shadow-sm border border-slate-200">ย้อนกลับ</a>
        <button id="update-post-btn" class="px-8 py-3 bg-slate-800 text-white rounded-2xl hover:bg-slate-900 transition-all font-bold shadow-xl shadow-slate-200 hidden active:scale-95">บันทึกการแก้ไข</button>
      </div>
    </div>

    <!-- Read only warning -->
    <div id="readonly-warning" class="hidden mb-10 p-8 bg-slate-800 text-white rounded-[2rem] shadow-premium flex items-center gap-6 border-t-4 border-[#b89474]">
      <span class="text-4xl">📢</span>
      <div>
        <p class="font-black text-xl mb-1">โพสต์นี้ได้รับการตรวจจากหน้าบ้านแล้ว</p>
        <p class="text-slate-300 font-medium">แอดมินสามารถดูผลตรวจได้อย่างเดียว ไม่สามารถแก้ไขข้อมูลตั้งต้นได้เพื่อรักษาความเห็นเบื้องต้นของผู้ตรวจ</p>
      </div>
    </div>

    <div class="bg-white/80 rounded-[2rem] shadow-xl p-8 mb-10 border border-white/40 space-y-8">
      <h3 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
        <span class="w-1.5 h-6 bg-[#b89474] rounded-full"></span>
        ข้อมูลหลักของโพสต์
      </h3>
      <div class="space-y-4">
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-slate-600 ml-1">ชื่อโพสต์ (หมายเลขห้อง / สถานที่) *</label>
          <input type="text" id="edit-title" required class="w-full px-5 py-3.5 bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 focus:border-solid outline-none transition-all">
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-slate-600 ml-1">ชื่อผู้ตรวจงาน</label>
          <input type="text" id="edit-inspector" readonly class="w-full px-5 py-3.5 bg-slate-100/50 border-2 border-dashed border-slate-200 rounded-2xl text-slate-500 cursor-not-allowed italic font-medium">
        </div>
      </div>
    </div>

    <div class="bg-white/80 rounded-[2rem] shadow-xl p-8 mb-10 border border-white/40" id="topic-0">
      <h3 class="text-xl font-black text-slate-800 mb-6 flex items-center gap-3">
        <span class="w-1.5 h-6 bg-[#b89474] rounded-full"></span>
        0. ผังหรือแปลนงาน
      </h3>
      <div class="space-y-6">
        <div class="bg-slate-50/50 p-8 rounded-[2rem] border-2 border-dashed border-slate-200">
          <label class="block text-sm font-black text-slate-700 mb-4">📸 รูปผังหรือแปลน</label>
          <input type="file" id="edit-plan-image-upload" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-slate-800 file:text-white hover:file:bg-slate-900 transition-all cursor-pointer">
          <div id="plan-image-preview" class="mt-8 flex justify-center"></div>
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-semibold text-slate-600 ml-1">🔗 ลิ้ง Google Drive สำหรับดูงาน</label>
          <input type="url" id="edit-drive-link" class="w-full px-5 py-3.5 bg-slate-50 border-2 border-dashed border-slate-300 rounded-2xl focus:ring-4 focus:ring-blue-100 focus:border-blue-400 focus:border-solid outline-none transition-all">
        </div>
      </div>
    </div>

    <div id="edit-topics-container" class="space-y-8">
      <!-- Topics loaded dynamically -->
    </div>

    <div id="inspection-results-container" class="hidden mt-16">
      <h2 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-4">
        <span class="w-10 h-10 bg-slate-800 text-white rounded-xl flex items-center justify-center text-lg">📝</span>
        ผลการตรวจงานจากหน้าบ้าน
      </h2>
      <div id="results-list" class="space-y-6"></div>
    </div>

  </div>


  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/image-marker.js"></script>
  <script src="js/backend.js"></script>
</body>
</html>
